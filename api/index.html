<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOTAai Ingredient Intelligence</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --high: #ff6b6b; --medium: #ffa502; --low: #4caf50;
      --header: #1a365d; --card: #ffffff; --text: #1a202c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8; color: var(--text); padding: 10px;
    }
    .container { max-width: 100%; margin: 0 auto; overflow-x: hidden; }
    header {
      background: var(--header); color: white; padding: 1rem;
      border-radius: 12px; margin-bottom: 15px; text-align: center;
    }
    .summary-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px; margin-bottom: 15px;
    }
    .summary-card {
      background: var(--card); border-radius: 12px; padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-top: 4px solid var(--low);
    }
    .summary-card.critical { border-top-color: var(--high); }
    .summary-value { font-size: 1.5rem; font-weight: 800; color: var(--header); }

    .chart-container {
      background: white; border-radius: 12px; padding: 15px;
      margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      height: 300px;
    }

    .table-section {
      background: white; border-radius: 12px; padding: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { background: #edf2f7; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #e2e8f0; }
    
    .urgency-badge {
      padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold;
    }
    .urgency-high { background: #fed7d7; color: #c53030; }

    @media (max-width: 600px) {
      .summary-value { font-size: 1.2rem; }
      th, td { padding: 6px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🍛 KOTAai SMART DASHBOARD</h1>
      <p>Nosty'$ Fresh Fast Food Jouberton</p>
    </header>

    <div class="summary-grid">
      <div class="summary-card">
        <p>Items</p>
        <div class="summary-value" id="total-items">-</div>
      </div>
      <div class="summary-card critical">
        <p>Critical</p>
        <div class="summary-value" id="critical-items">-</div>
      </div>
      <div class="summary-card">
        <p>Updated</p>
        <div class="summary-value" id="last-update" style="font-size: 1rem;">-</div>
      </div>
    </div>

    <div class="chart-container">
      <h3 style="margin-bottom:10px;">📈 Expected Meals to be Sold (Today)</h3>
      <canvas id="mealChart"></canvas>
    </div>

    <div class="table-section">
      <h3 style="margin-bottom:10px;">📋 Stock & Intelligence</h3>
      <table>
        <thead>
          <tr>
            <th>Ingredient</th>
            <th>Stock</th>
            <th>Usage</th>
            <th>Days</th>
            <th>Urgency</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    let mealChart = null;

    async function updateData() {
      try {
        // 1. Fetch Meal Forecasts
        const mealRes = await fetch('/api/forecast-meals', {method:'POST'});
        const mealData = await mealRes.json();
        renderChart(mealData);

        // 2. Fetch Ingredient Dashboard
        const ingredients = ["Chips", "Cheese", "Russian", "Bread", "Tomato", "Atchaar", "Egg", "Steak", "Polony"];
        const dashRes = await fetch('/api/dashboard', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ items: ingredients.map(n => ({item_name: n})) })
        });
        const data = await dashRes.json();

        document.getElementById('total-items').textContent = data.summary.total_items;
        document.getElementById('critical-items').textContent = data.summary.critical_items;
        document.getElementById('last-update').textContent = data.summary.timestamp.split(' ')[1];

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        data.items.forEach(item => {
          const row = `<tr>
            <td><strong>${item.item_name}</strong></td>
            <td>${item.current_stock}</td>
            <td>${item.daily_usage}</td>
            <td>${item.days_left}</td>
            <td><span class="urgency-badge urgency-${item.urgency.toLowerCase()}">${item.urgency}</span></td>
          </tr>`;
          tbody.innerHTML += row;
        });
      } catch (e) { console.error(e); }
    }

    function renderChart(data) {
      const ctx = document.getElementById('mealChart').getContext('2d');
      if (mealChart) mealChart.destroy();
      mealChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: Object.keys(data),
          datasets: [{
            label: 'Projected Sales',
            data: Object.values(data),
            backgroundColor: '#3182ce',
            borderRadius: 5
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: { y: { beginAtZero: true } }
        }
      });
    }

    updateData();
    setInterval(updateData, 300000);
  </script>
</body>
  </html>
