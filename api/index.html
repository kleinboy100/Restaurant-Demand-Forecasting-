<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KOTAai Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: "Segoe UI", sans-serif;
      background: #f5f7fa;
      color: #1a202c;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #3182ce;
      text-align: center;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      font-size: 0.95rem;
      color: #718096;
      margin-bottom: 30px;
    }
    .summary {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }
    .summary span {
      font-weight: 600;
      color: #2b6cb0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: transform 0.2s ease;
    }
    .card:hover {
      transform: translateY(-3px);
    }
    .card h3 {
      margin: 0 0 10px;
      color: #2d3748;
    }
    .card p {
      margin: 5px 0;
      font-size: 0.95rem;
    }
    .status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .status.OK { background: #c6f6d5; color: #22543d; }
    .status.LOW { background: #fef5e7; color: #975a16; }
    .status.CRITICAL { background: #fed7d7; color: #742a2a; }
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 1.1rem;
      color: #4a5568;
    }
    .error {
      background: #fed7d7;
      color: #742a2a;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      text-align: center;
    }
    button.reload {
      margin-top: 15px;
      padding: 10px 20px;
      background: #3182ce;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    button.reload:hover {
      background: #2b6cb0;
    }
  </style>
</head>
<body>
  <h1>🍛 KOTAai Ingredient Dashboard</h1>
  <p class="subtitle">Real-time stock + demand forecasting</p>

  <div id="summary" class="summary" style="display:none;">
    <p>Total Items: <span id="total_items"></span></p>
    <p>Critical Items: <span id="critical_items"></span></p>
    <p>Recommended Orders: <span id="total_recommended"></span></p>
    <p>Last Updated: <span id="timestamp"></span></p>
  </div>

  <div id="loading" class="loading">Loading data...</div>
  <div id="error" class="error" style="display:none;"></div>

  <div id="grid" class="grid"></div>

  <button class="reload" onclick="loadDashboard()">🔄 Reload Data</button>

  <script>
    const CONFIG = {
      API_BASE: 'https://restaurant-demand-forecasting-1.onrender.com' ,
      INGREDIENTS: [
        "Chips", "Melted Cheese", "Russian", "Lettuce",
        "Bread", "Tomato", "Atchar", "Vienna", "Egg", "Steak"
      ]
    };

    async function loadDashboard() {
      const $loading = document.getElementById("loading");
      const $error = document.getElementById("error");
      const $summary = document.getElementById("summary");
      const $grid = document.getElementById("grid");

      $loading.style.display = "block";
      $error.style.display = "none";
      $summary.style.display = "none";
      $grid.innerHTML = "";

      try {
        const res = await fetch(`${CONFIG.API_BASE}/api/dashboard`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            items: CONFIG.INGREDIENTS.map(name => ({ item_name: name }))
          })
        });

        if (!res.ok) throw new Error(`Server responded with ${res.status}`);

        const data = await res.json();

        // Summary
        const summary = data.summary || {};
        document.getElementById("total_items").textContent = summary.total_items ?? "-";
        document.getElementById("critical_items").textContent = summary.critical_items ?? "-";
        document.getElementById("total_recommended").textContent = summary.total_recommended?.toFixed(1) ?? "-";
        document.getElementById("timestamp").textContent = summary.timestamp ?? "-";
        $summary.style.display = "block";

        // Grid
        const items = data.items ?? [];
        if (!items.length) throw new Error("No data returned from API.");

        items.forEach(item => {
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <h3>${item.item_name}</h3>
            <p><strong>Stock:</strong> ${item.current_stock?.toFixed(1) ?? "-"} units</p>
            <p><strong>Daily Usage:</strong> ${item.daily_usage?.toFixed(1) ?? "-"}</p>
            <p><strong>Weekly Demand:</strong> ${item.weekly_demand?.toFixed(1) ?? "-"}</p>
            <p><strong>Days Left:</strong> ${item.days_left?.toFixed(1) ?? "-"}</p>
            <p><strong>Recommended:</strong> ${item.recommended_order?.toFixed(1) ?? "-"}</p>
            <p><strong>Status:</strong> <span class="status ${item.status}">${item.status}</span></p>
            <p><em>${item.action ?? ""}</em></p>
          `;
          $grid.appendChild(card);
        });
      } catch (err) {
        $error.textContent = "⚠️ Error loading data: " + err.message;
        $error.style.display = "block";
      } finally {
        $loading.style.display = "none";
      }
    }

    // Load on startup
    window.addEventListener("DOMContentLoaded", loadDashboard);
  </script>
</body>
</html>
